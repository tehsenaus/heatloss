<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heat Loss Calculator</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; background: #f0f2f5; min-height: 100vh; }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="main.js"></script>
    <script>
        function b64UrlEncode(floats) {
            var buf = new Float32Array(floats);
            var bytes = new Uint8Array(buf.buffer);
            var s = '';
            for (var i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
            return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        function b64UrlDecode(str) {
            try {
                var s = atob(str.replace(/-/g, '+').replace(/_/g, '/'));
                var bytes = new Uint8Array(s.length);
                for (var i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);
                // Pad to multiple of 4 bytes (in case of trailing cruft)
                var len = bytes.length - (bytes.length % 4);
                var view = new Float32Array(bytes.buffer, 0, len / 4);
                return Array.from(view);
            } catch (e) {
                return null;
            }
        }

        function readHashParams() {
            var hash = window.location.hash.replace(/^#/, '');
            if (!hash) return null;
            var parts = hash.split('.');
            if (parts.length !== 2 || parts[0] !== 'v1') return null;
            return b64UrlDecode(parts[1]);
        }

        var flags = readHashParams();
        var app = Elm.Main.init({
            node: document.getElementById('app'),
            flags: flags
        });

        app.ports.saveParams.subscribe(function (floats) {
            var encoded = 'v1.' + b64UrlEncode(floats);
            if (('#' + encoded) !== window.location.hash) {
                history.replaceState(null, '', '#' + encoded);
            }
        });
    </script>
</body>
</html>
